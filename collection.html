<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>L'ESSENCE - Shop</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600&family=Noto+Serif:wght@400&display=swap" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: { "primary": "#1e1e1e", "background": "#f9f9f9" }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-primary font-['Manrope']">
    <nav class="flex justify-between items-center px-12 py-6 border-b border-outline-variant/20 bg-white">
        <div class="text-xl font-light tracking-[0.4em] uppercase">L'ESSENCE</div>
        <div class="flex gap-8 text-[10px] tracking-widest uppercase font-semibold">
            <a href="index.html" class="hover:opacity-60 transition">Home</a>
            <a href="collection.html" class="border-b border-primary">Shop</a>
            <a href="store policies.html" class="hover:opacity-60 transition">Policies</a>
        </div>
    </nav>
    <main class="p-12">
        <h2 class="text-3xl font-['Noto_Serif'] mb-12 uppercase tracking-widest text-center">Our Collection</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-12">
            <article class="flex flex-col gap-4">
                <div class="aspect-square bg-gray-200"></div>
                <div class="flex justify-between items-start">
                    <div>
                        <h3 class="font-semibold uppercase text-sm">Gentlemen's Fragrance</h3>
                        <p class="text-xs text-gray-500">Essential Scent</p>
                    </div>
                    <span class="font-bold">6500 BIRR</span>
                </div>
                <a href="checkout.html" class="w-full text-center py-3 border border-primary text-xs uppercase tracking-widest hover:bg-primary hover:text-white transition">Buy Now</a>
            </article>
        </div>
    </main>
</body>
</html>
