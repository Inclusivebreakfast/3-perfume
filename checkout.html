<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>L'ESSENCE - Checkout</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600&family=Noto+Serif:wght@400&display=swap" rel="stylesheet">
</head>
<body class="bg-[#f9f9f9] font-['Manrope']">
    <header class="p-8 text-center border-b border-gray-100">
        <a href="index.html" class="text-2xl font-light tracking-[0.5em] uppercase">L'ESSENCE</a>
    </header>
    <main class="max-w-4xl mx-auto py-16 px-8 flex flex-col md:flex-row gap-16">
        <section class="flex-1">
            <h2 class="text-sm uppercase tracking-widest font-bold mb-8">Shipping Details</h2>
            <form class="flex flex-col gap-6">
                <input type="text" placeholder="Full Name" class="border-b border-gray-300 py-3 bg-transparent focus:outline-none focus:border-black transition">
                <input type="text" placeholder="Address" class="border-b border-gray-300 py-3 bg-transparent focus:outline-none focus:border-black transition">
                <button type="submit" class="bg-black text-white py-4 uppercase tracking-[0.2em] text-xs mt-4">Place Order</button>
            </form>
        </section>
        <section class="w-full md:w-80 bg-white p-8">
            <h3 class="text-xs uppercase tracking-widest font-bold mb-6">Order Summary</h3>
            <div class="flex justify-between text-sm mb-4">
                <span>Fragrance</span>
                <span>6500 BIRR</span>
            </div>
            <div class="border-t border-gray-100 pt-4 flex justify-between font-bold">
                <span>Total</span>
                <span>6500 BIRR</span>
            </div>
        </section>
    </main>
</body>
</html>
